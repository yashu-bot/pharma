<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fas fa-store"></i> Medical Store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">My Orders</a></li>
                    <li class="nav-item">
                        <a class="nav-link active" href="cart.html">
                            <i class="fas fa-shopping-cart"></i> Cart <span class="badge bg-danger" id="cartCount">0</span>
                        </a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Back Button -->
    <button class="back-button no-print" onclick="goBack()" title="Go Back">
        <i class="fas fa-arrow-left"></i>
    </button>

    <div class="container-fluid mt-4 mb-5 pb-5">
        <h2 class="mb-4">Shopping Cart</h2>
        
        <div class="row">
            <div class="col-md-8">
                <div id="cartItems"></div>
            </div>
            
            <div class="col-md-4">
                <div class="card cart-summary">
                    <div class="card-header">Order Summary</div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal:</span>
                            <strong id="subtotal">₹0.00</strong>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>SGST (<span id="sgstPercent">0</span>%):</span>
                            <strong id="sgst">₹0.00</strong>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>CGST (<span id="cgstPercent">0</span>%):</span>
                            <strong id="cgst">₹0.00</strong>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-3">
                            <h5>Grand Total:</h5>
                            <h5 class="text-primary" id="grandTotal">₹0.00</h5>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="sticky-footer">
        <div class="container-fluid">
            <button class="btn btn-primary btn-lg w-100" onclick="placeOrder()">
                <i class="fas fa-check"></i> Place Order
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/cart.js"></script>
    <script>
        checkAuth('user');
        
        async function renderCart() {
            const cart = getCart();
            const container = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                container.innerHTML = '<div class="alert alert-info">Your cart is empty. <a href="shop.html">Start shopping</a></div>';
                return;
            }
            
            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h5>${item.productName}</h5>
                            <p class="mb-0">${formatCurrency(item.price)} × ${item.quantity}</p>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <div class="quantity-control">
                                <button class="btn btn-sm btn-outline-primary" onclick="updateQuantity(${item.productId}, ${item.quantity - 1}); renderCart();">
                                    <i class="fas fa-minus"></i>
                                </button>
                                <input type="number" class="form-control" value="${item.quantity}" min="1" max="${item.maxStock}" 
                                    onchange="updateQuantity(${item.productId}, parseInt(this.value)); renderCart();">
                                <button class="btn btn-sm btn-outline-primary" onclick="updateQuantity(${item.productId}, ${item.quantity + 1}); renderCart();">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                            <button class="btn btn-sm btn-danger" onclick="removeFromCart(${item.productId}); renderCart();">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="text-end mt-2">
                        <strong>Total: ${formatCurrency(item.price * item.quantity)}</strong>
                    </div>
                </div>
            `).join('');
            
            const totals = await calculateCartTotals();
            document.getElementById('subtotal').textContent = formatCurrency(totals.subtotal);
            document.getElementById('sgst').textContent = formatCurrency(totals.sgst);
            document.getElementById('cgst').textContent = formatCurrency(totals.cgst);
            document.getElementById('sgstPercent').textContent = totals.sgst_percentage;
            document.getElementById('cgstPercent').textContent = totals.cgst_percentage;
            document.getElementById('grandTotal').textContent = formatCurrency(totals.grandTotal);
        }
        
        async function placeOrder() {
            const cart = getCart();
            if (cart.length === 0) {
                showAlert('Your cart is empty', 'warning');
                return;
            }
            
            const user = JSON.parse(localStorage.getItem('user'));
            const items = cart.map(item => ({
                product_id: item.productId,
                quantity: item.quantity
            }));
            
            try {
                const response = await axios.post('/orders', {
                    items,
                    user_id: user.id
                });
                
                showAlert('Order placed successfully!', 'success');
                clearCart();
                setTimeout(() => {
                    window.location.href = `../invoice.html?order_id=${response.data.order_id}`;
                }, 1500);
            } catch (error) {
                showAlert(error.response?.data?.message || 'Error placing order', 'danger');
            }
        }
        
        renderCart();
        updateCartCount();
    </script>
</body>
</html>
