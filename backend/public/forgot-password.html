<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Pharma Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-key fa-3x mb-3"></i>
                <h2>Reset Password</h2>
                <p>Enter your details to receive OTP</p>
            </div>

            <div class="login-body">
                <!-- Step 1: Select Role and Enter Details -->
                <form id="requestForm" style="display: block;">
                    <div class="mb-3">
                        <label class="form-label">Select Role</label>
                        <select class="form-select" id="role" name="role" required onchange="toggleFormFields()">
                            <option value="">Choose...</option>
                            <option value="admin">Admin</option>
                            <option value="worker">Worker</option>
                            <option value="user">User</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="Enter your phone number" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    
                    <!-- For User/Worker: Direct Password Reset -->
                    <div id="directResetFields" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control" id="directNewPassword" name="newPassword" 
                                   placeholder="Enter new password" minlength="6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="directConfirmPassword" name="confirmPassword" 
                                   placeholder="Confirm new password" minlength="6">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                        <i class="fas fa-paper-plane"></i> <span id="submitBtnText">Continue</span>
                    </button>
                </form>

                <!-- Step 2: Admin OTP Verification -->
                <form id="verifyOTPForm" style="display: none;">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle"></i> OTP has been sent to your email. Please check your inbox.
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Enter OTP</label>
                        <input type="text" class="form-control text-center" id="otp" name="otp" 
                               placeholder="000000" maxlength="6" pattern="[0-9]{6}" 
                               style="font-size: 24px; letter-spacing: 8px; font-weight: bold;" required>
                        <small class="text-muted">Valid for 10 minutes</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" class="form-control" id="newPassword" name="newPassword" 
                               placeholder="Enter new password" minlength="6" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" 
                               placeholder="Confirm new password" minlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="fas fa-check"></i> Verify & Reset Password
                    </button>
                    <button type="button" class="btn btn-secondary w-100 mt-2" onclick="resendOTP()">
                        <i class="fas fa-redo"></i> Resend OTP
                    </button>
                </form>

                <div class="text-center mt-3">
                    <a href="login.html" class="text-decoration-none">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/config.js"></script>
    <script>
        let userData = {};

        // Toggle form fields based on role
        function toggleFormFields() {
            const role = document.getElementById('role').value;
            const directResetFields = document.getElementById('directResetFields');
            const submitBtnText = document.getElementById('submitBtnText');
            const directNewPassword = document.getElementById('directNewPassword');
            const directConfirmPassword = document.getElementById('directConfirmPassword');
            
            if (role === 'admin') {
                // Admin: OTP flow
                directResetFields.style.display = 'none';
                submitBtnText.textContent = 'Send OTP';
                directNewPassword.removeAttribute('required');
                directConfirmPassword.removeAttribute('required');
            } else if (role === 'worker' || role === 'user') {
                // User/Worker: Direct reset
                directResetFields.style.display = 'block';
                submitBtnText.textContent = 'Reset Password';
                directNewPassword.setAttribute('required', 'required');
                directConfirmPassword.setAttribute('required', 'required');
            } else {
                directResetFields.style.display = 'none';
                submitBtnText.textContent = 'Continue';
            }
        }

        // Handle form submission
        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            
            try {
                const formData = new FormData(e.target);
                userData = Object.fromEntries(formData);
                const role = userData.role;
                
                if (role === 'admin') {
                    // Admin: Send OTP
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
                    
                    const response = await axios.post('/auth/request-otp', userData);
                    alert(response.data.message);
                    
                    // Switch to OTP verification form
                    document.getElementById('requestForm').style.display = 'none';
                    document.getElementById('verifyOTPForm').style.display = 'block';
                    
                } else if (role === 'worker' || role === 'user') {
                    // User/Worker: Direct password reset
                    if (userData.newPassword !== userData.confirmPassword) {
                        alert('Passwords do not match');
                        return;
                    }
                    
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
                    
                    const response = await axios.post('/auth/direct-reset-password', userData);
                    alert(response.data.message);
                    window.location.href = 'login.html';
                }
                
            } catch (error) {
                alert(error.response?.data?.message || 'Failed to process request. Please try again.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        // Verify OTP and Reset Password (Admin only)
        document.getElementById('verifyOTPForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            // Validate passwords match
            if (data.newPassword !== data.confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            
            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
                
                // Combine with stored user data
                const resetData = {
                    ...userData,
                    ...data
                };
                
                const response = await axios.post('/auth/verify-otp-reset', resetData);
                
                alert(response.data.message);
                window.location.href = 'login.html';
                
            } catch (error) {
                alert(error.response?.data?.message || 'Failed to reset password. Please try again.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        // Resend OTP
        async function resendOTP() {
            try {
                const response = await axios.post('/auth/request-otp', userData);
                alert(response.data.message);
            } catch (error) {
                alert(error.response?.data?.message || 'Failed to resend OTP. Please try again.');
            }
        }

        // Auto-focus OTP input and format
        document.getElementById('otp').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
