<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fas fa-pills"></i> Pharma Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="sections.html">Sections</a></li>
                    <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="stock.html">Stock</a></li>
                    <li class="nav-item"><a class="nav-link" href="workers.html">Workers</a></li>
                    <li class="nav-item"><a class="nav-link" href="users.html">Users</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">Order History</a></li>
                    <li class="nav-item"><a class="nav-link" href="settings.html">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Back Button -->
    <button class="back-button no-print" onclick="goBack()" title="Go Back">
        <i class="fas fa-arrow-left"></i>
    </button>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Product Master</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal" onclick="resetForm()">
                <i class="fas fa-plus"></i> Add Product
            </button>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <select class="form-select" id="sectionFilter" onchange="loadProducts()">
                            <option value="">All Sections</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control" id="searchInput" placeholder="Search products..." onkeyup="loadProducts()">
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Product Name</th>
                                <th>Section</th>
                                <th>Created Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="productForm">
                    <div class="modal-body">
                        <input type="hidden" id="productId">
                        <div class="mb-3">
                            <label class="form-label">Section</label>
                            <select class="form-select" name="section_id" id="sectionSelect" required>
                                <option value="">Select Section</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Product Name</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Save Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="../js/config.js"></script>
    <script>
        checkAuth('admin');
        
        let products = [];
        let sections = [];
        
        async function loadSections() {
            try {
                const response = await axios.get('/sections');
                sections = response.data.data;
                
                const sectionFilter = document.getElementById('sectionFilter');
                const sectionSelect = document.getElementById('sectionSelect');
                
                sectionFilter.innerHTML = '<option value="">All Sections</option>' + 
                    sections.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                
                sectionSelect.innerHTML = '<option value="">Select Section</option>' + 
                    sections.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                
                // Initialize Select2 for section select
                $('#sectionSelect').select2({
                    theme: 'bootstrap-5',
                    placeholder: 'Search and select section',
                    allowClear: true,
                    dropdownParent: $('#productModal'),
                    width: '100%'
                });
            } catch (error) {
                console.error('Error loading sections:', error);
            }
        }
        
        async function loadProducts() {
            try {
                const search = document.getElementById('searchInput').value;
                const section_id = document.getElementById('sectionFilter').value;
                const response = await axios.get('/product-master', {
                    params: { search, section_id }
                });
                products = response.data.data;
                
                const tbody = document.getElementById('productsTable');
                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td>${p.name}</td>
                        <td>${p.section_name || '-'}</td>
                        <td>${formatDate(p.created_at)}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editProduct(${p.id})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }
        
        function resetForm() {
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('modalTitle').textContent = 'Add Product';
            
            // Reset Select2
            $('#sectionSelect').val('').trigger('change');
        }
        
        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            
            document.getElementById('productId').value = product.id;
            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.querySelector('[name="name"]').value = product.name;
            $('#sectionSelect').val(product.section_id).trigger('change');
            
            new bootstrap.Modal(document.getElementById('productModal')).show();
        }
        
        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;
            
            try {
                await axios.delete(`/product-master/${id}`);
                showAlert('Product deleted successfully', 'success');
                loadProducts();
            } catch (error) {
                showAlert(error.response?.data?.message || 'Error deleting product', 'danger');
            }
        }
        
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const id = document.getElementById('productId').value;
            
            try {
                if (id) {
                    await axios.put(`/product-master/${id}`, data);
                    showAlert('Product updated successfully', 'success');
                } else {
                    await axios.post('/product-master', data);
                    showAlert('Product added successfully', 'success');
                }
                
                bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
                loadProducts();
            } catch (error) {
                showAlert(error.response?.data?.message || 'Error saving product', 'danger');
            }
        });
        
        document.addEventListener('DOMContentLoaded', function() {
            loadSections();
            loadProducts();
        });
    </script>
</body>
</html>
