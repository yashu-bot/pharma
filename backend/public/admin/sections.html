<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sections - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fas fa-pills"></i> Pharma Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="sections.html">Sections</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="workers.html">Workers</a></li>
                    <li class="nav-item"><a class="nav-link" href="users.html">Users</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">Order History</a></li>
                    <li class="nav-item"><a class="nav-link" href="settings.html">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Back Button -->
    <button class="back-button no-print" onclick="goBack()" title="Go Back">
        <i class="fas fa-arrow-left"></i>
    </button>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Product Sections</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#sectionModal" onclick="resetForm()">
                <i class="fas fa-plus"></i> Add Section
            </button>
        </div>

        <div class="row" id="sectionsContainer"></div>
    </div>

    <!-- Section Modal -->
    <div class="modal fade" id="sectionModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Section</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="sectionForm">
                    <div class="modal-body">
                        <input type="hidden" id="sectionId">
                        <div class="mb-3">
                            <label class="form-label">Section Name</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Save Section</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/config.js"></script>
    <script>
        checkAuth('admin');
        let sections = [];
        
        async function loadSections() {
            try {
                const response = await axios.get('/sections');
                sections = response.data.data;
                
                const container = document.getElementById('sectionsContainer');
                container.innerHTML = sections.map(s => `
                    <div class="col-md-3 col-sm-6 mb-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <i class="fas fa-pills fa-3x text-primary mb-3"></i>
                                <h5>${s.name}</h5>
                                <button class="btn btn-sm btn-warning me-2" onclick="editSection(${s.id})">
                                    <i class="fas fa-edit"></i> Edit
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteSection(${s.id})">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading sections:', error);
            }
        }
        
        function resetForm() {
            document.getElementById('sectionForm').reset();
            document.getElementById('sectionId').value = '';
            document.getElementById('modalTitle').textContent = 'Add Section';
        }
        
        function editSection(id) {
            const section = sections.find(s => s.id === id);
            if (!section) return;
            
            document.getElementById('sectionId').value = section.id;
            document.getElementById('modalTitle').textContent = 'Edit Section';
            document.querySelector('[name="name"]').value = section.name;
            
            new bootstrap.Modal(document.getElementById('sectionModal')).show();
        }
        
        async function deleteSection(id) {
            if (!confirm('Are you sure? This will delete all products in this section.')) return;
            
            try {
                await axios.delete(`/sections/${id}`);
                showAlert('Section deleted successfully', 'success');
                loadSections();
            } catch (error) {
                showAlert(error.response?.data?.message || 'Error deleting section', 'danger');
            }
        }
        
        document.getElementById('sectionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const id = document.getElementById('sectionId').value;
            
            try {
                if (id) {
                    await axios.put(`/sections/${id}`, data);
                    showAlert('Section updated successfully', 'success');
                } else {
                    await axios.post('/sections', data);
                    showAlert('Section added successfully', 'success');
                }
                
                bootstrap.Modal.getInstance(document.getElementById('sectionModal')).hide();
                loadSections();
            } catch (error) {
                showAlert(error.response?.data?.message || 'Error saving section', 'danger');
            }
        });
        
        loadSections();
    </script>
</body>
</html>
