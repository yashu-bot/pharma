<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fas fa-pills"></i> Pharma Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="sections.html">Sections</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="workers.html">Workers</a></li>
                    <li class="nav-item"><a class="nav-link" href="users.html">Users</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">Order History</a></li>
                    <li class="nav-item"><a class="nav-link active" href="settings.html">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Back Button -->
    <button class="back-button no-print" onclick="goBack()" title="Go Back">
        <i class="fas fa-arrow-left"></i>
    </button>

    <div class="container-fluid mt-4">
        <h2 class="mb-4">Settings</h2>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">Profile Settings</div>
                    <div class="card-body">
                        <form id="profileForm">
                            <div class="mb-3">
                                <label class="form-label">Pharma Name</label>
                                <input type="text" class="form-control" name="pharma_name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" name="email" placeholder="your-email@example.com" required>
                                <small class="text-muted">Required for password reset via OTP</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Address</label>
                                <textarea class="form-control" name="address" rows="3"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Phone</label>
                                <input type="tel" class="form-control" name="phone" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Update Profile</button>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">Change Password</div>
                    <div class="card-body">
                        <form id="passwordForm">
                            <div class="mb-3">
                                <label class="form-label">Current Password</label>
                                <input type="password" class="form-control" name="currentPassword" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <input type="password" class="form-control" name="newPassword" minlength="6" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Change Password</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">GST Settings</div>
                    <div class="card-body">
                        <form id="gstForm">
                            <div class="mb-3">
                                <label class="form-label">SGST Percentage (%)</label>
                                <input type="number" step="0.01" class="form-control" name="sgst_percentage" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">CGST Percentage (%)</label>
                                <input type="number" step="0.01" class="form-control" name="cgst_percentage" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Update GST</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/config.js"></script>
    <script>
        checkAuth('admin');
        
        async function loadProfile() {
            try {
                const response = await axios.get('/admin/profile');
                const data = response.data.data;
                
                document.querySelector('[name="pharma_name"]').value = data.pharma_name;
                document.querySelector('[name="email"]').value = data.email || '';
                document.querySelector('[name="address"]').value = data.address || '';
                document.querySelector('[name="phone"]').value = data.phone;
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }
        
        async function loadGST() {
            try {
                const response = await axios.get('/admin/gst');
                const data = response.data.data;
                
                document.querySelector('[name="sgst_percentage"]').value = data.sgst_percentage;
                document.querySelector('[name="cgst_percentage"]').value = data.cgst_percentage;
            } catch (error) {
                console.error('Error loading GST:', error);
            }
        }
        
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                await axios.put('/admin/profile', data);
                showAlert('Profile updated successfully', 'success');
            } catch (error) {
                showAlert(error.response?.data?.message || 'Error updating profile', 'danger');
            }
        });
        
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                await axios.post('/admin/change-password', data);
                showAlert('Password changed successfully', 'success');
                e.target.reset();
            } catch (error) {
                showAlert(error.response?.data?.message || 'Error changing password', 'danger');
            }
        });
        
        document.getElementById('gstForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                await axios.put('/admin/gst', data);
                showAlert('GST settings updated successfully', 'success');
            } catch (error) {
                showAlert(error.response?.data?.message || 'Error updating GST', 'danger');
            }
        });
        
        loadProfile();
        loadGST();
    </script>
</body>
</html>
