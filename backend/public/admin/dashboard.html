<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Pharma Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fas fa-pills"></i> Pharma Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="sections.html">Sections</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="workers.html">Workers</a></li>
                    <li class="nav-item"><a class="nav-link" href="users.html">Users</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">Orders</a></li>
                    <li class="nav-item"><a class="nav-link" href="settings.html">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Back Button -->
    <button class="back-button no-print" onclick="goBack()" title="Go Back">
        <i class="fas fa-arrow-left"></i>
    </button>

    <div class="container-fluid mt-4">
        <h2 class="mb-4">Dashboard</h2>
        
        <div class="row" id="statsContainer">
            <div class="col-md-3 col-6 mb-3">
                <div class="dashboard-card">
                    <i class="fas fa-capsules text-primary"></i>
                    <h3 id="totalProducts">0</h3>
                    <p>Total Products</p>
                </div>
            </div>
            <div class="col-md-3 col-6 mb-3">
                <div class="dashboard-card">
                    <i class="fas fa-shopping-cart text-success"></i>
                    <h3 id="totalOrders">0</h3>
                    <p>Total Orders</p>
                </div>
            </div>
            <div class="col-md-3 col-6 mb-3">
                <div class="dashboard-card">
                    <i class="fas fa-users text-info"></i>
                    <h3 id="totalUsers">0</h3>
                    <p>Total Users</p>
                </div>
            </div>
            <div class="col-md-3 col-6 mb-3">
                <div class="dashboard-card">
                    <i class="fas fa-user-tie text-warning"></i>
                    <h3 id="totalWorkers">0</h3>
                    <p>Total Workers</p>
                </div>
            </div>
            <div class="col-md-3 col-6 mb-3">
                <div class="dashboard-card">
                    <i class="fas fa-exclamation-triangle text-danger"></i>
                    <h3 id="lowStock">0</h3>
                    <p>Low Stock</p>
                </div>
            </div>
            <div class="col-md-3 col-6 mb-3">
                <div class="dashboard-card">
                    <i class="fas fa-clock text-warning"></i>
                    <h3 id="expiringSoon">0</h3>
                    <p>Expiring Soon</p>
                </div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header">Recent Orders</div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Medical Name</th>
                                <th>Owner</th>
                                <th>Total</th>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="recentOrdersTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/config.js"></script>
    <script>
        checkAuth('admin');
        
        async function loadDashboard() {
            try {
                const response = await axios.get('/admin/dashboard');
                const data = response.data.data;
                
                document.getElementById('totalProducts').textContent = data.totalProducts;
                document.getElementById('totalOrders').textContent = data.totalOrders;
                document.getElementById('totalUsers').textContent = data.totalUsers;
                document.getElementById('totalWorkers').textContent = data.totalWorkers;
                document.getElementById('lowStock').textContent = data.lowStock;
                document.getElementById('expiringSoon').textContent = data.expiringSoon;
                
                const tbody = document.getElementById('recentOrdersTable');
                tbody.innerHTML = data.recentOrders.map(order => `
                    <tr>
                        <td>#${order.id}</td>
                        <td>${order.medical_name}</td>
                        <td>${order.owner_name}</td>
                        <td>${formatCurrency(order.grand_total)}</td>
                        <td>${formatDate(order.created_at)}</td>
                        <td><span class="badge bg-${order.status === 'completed' ? 'success' : 'warning'}">${order.status}</span></td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }
        
        loadDashboard();
    </script>
</body>
</html>
