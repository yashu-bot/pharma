<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Order - Worker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fas fa-user-tie"></i> Worker Panel</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="create-order.html">Create Order</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">My Orders</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showCart(); return false;">
                            <i class="fas fa-shopping-cart"></i> Cart <span class="badge bg-danger" id="cartCount">0</span>
                        </a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Back Button -->
    <button class="back-button no-print" onclick="goBack()" title="Go Back">
        <i class="fas fa-arrow-left"></i>
    </button>

    <div class="container-fluid mt-4">
        <!-- Step 1: Select Medical Store -->
        <div id="step1" class="card mb-4">
            <div class="card-header">Step 1: Select Medical Store</div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label">Search Medical Store</label>
                        <input type="text" class="form-control" id="searchStore" placeholder="Search by name..." onkeyup="searchStores()">
                    </div>
                </div>
                <div id="storesContainer" class="mt-3"></div>
            </div>
        </div>

        <!-- Step 2: Browse Products (Hidden initially) -->
        <div id="step2" style="display: none;">
            <div class="alert alert-info">
                <strong>Selected Store:</strong> <span id="selectedStoreName"></span>
                <button class="btn btn-sm btn-secondary float-end" onclick="changeStore()">Change Store</button>
            </div>

            <h4 class="mb-3">Browse Products</h4>
            
            <!-- Search Bar -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <input type="text" class="form-control" id="searchProducts" placeholder="🔍 Search products by name..." onkeyup="searchProducts()">
                        </div>
                        <div class="col-md-6">
                            <button class="btn btn-secondary" onclick="clearSearch()">
                                <i class="fas fa-times"></i> Clear Search
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="section-grid mb-4" id="sectionsContainer"></div>
            <div class="row" id="productsContainer"></div>
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="modal fade" id="cartModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Shopping Cart</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="cartItems"></div>
                    <hr>
                    <div class="row">
                        <div class="col-md-6">
                            <h5>Order Summary</h5>
                        </div>
                        <div class="col-md-6 text-end">
                            <p>Subtotal: <strong id="cartSubtotal">₹0.00</strong></p>
                            <p>SGST (<span id="cartSgstPercent">0</span>%): <strong id="cartSgst">₹0.00</strong></p>
                            <p>CGST (<span id="cartCgstPercent">0</span>%): <strong id="cartCgst">₹0.00</strong></p>
                            <h5>Grand Total: <strong class="text-primary" id="cartGrandTotal">₹0.00</strong></h5>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Continue Shopping</button>
                    <button type="button" class="btn btn-primary" onclick="placeOrder()">
                        <i class="fas fa-check"></i> Place Order
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/cart.js"></script>
    <script>
        checkAuth('worker');
        
        let selectedStore = null;
        let selectedSection = null;
        let stores = [];
        let allProducts = [];
        
        async function searchStores() {
            const search = document.getElementById('searchStore').value;
            if (search.length < 2) {
                document.getElementById('storesContainer').innerHTML = '';
                return;
            }
            
            try {
                const response = await axios.get('/users/search', { params: { search } });
                stores = response.data.data;
                
                const container = document.getElementById('storesContainer');
                container.innerHTML = stores.map(s => `
                    <div class="card mb-2" style="cursor: pointer;" onclick="selectStore(${s.id})">
                        <div class="card-body">
                            <h5>${s.medical_name}</h5>
                            <p class="mb-0"><strong>Owner:</strong> ${s.owner_name}</p>
                            <p class="mb-0"><strong>Phone:</strong> ${s.phone}</p>
                            <p class="mb-0"><strong>Address:</strong> ${s.address || '-'}</p>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error searching stores:', error);
            }
        }
        
        function selectStore(id) {
            selectedStore = stores.find(s => s.id === id);
            document.getElementById('selectedStoreName').textContent = selectedStore.medical_name;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            loadSections();
            loadProducts();
        }
        
        function changeStore() {
            selectedStore = null;
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').style.display = 'none';
            clearCart();
        }
        
        async function loadSections() {
            try {
                const response = await axios.get('/sections');
                const sections = response.data.data;
                
                const container = document.getElementById('sectionsContainer');
                container.innerHTML = sections.map(s => `
                    <div class="section-item ${selectedSection === s.id ? 'active' : ''}" onclick="selectSection(${s.id})">
                        <i class="fas fa-pills"></i>
                        <div>${s.name}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading sections:', error);
            }
        }
        
        function selectSection(id) {
            selectedSection = id;
            loadSections();
            loadProducts();
        }
        
        async function loadProducts() {
            try {
                const params = selectedSection ? { section_id: selectedSection } : {};
                const response = await axios.get('/products', { params });
                allProducts = response.data.data;
                displayProducts(allProducts);
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }
        
        function displayProducts(products) {
            const container = document.getElementById('productsContainer');
            
            if (products.length === 0) {
                container.innerHTML = '<div class="col-12"><div class="alert alert-info">No products found</div></div>';
                return;
            }
            
            container.innerHTML = products.map(p => {
                const isAvailable = p.availability_status === 'available' || p.availability_status === 'expiring_soon';
                const isExpiringSoon = p.availability_status === 'expiring_soon';
                const isNotAvailable = p.availability_status === 'not_available';
                const isOutOfStock = p.availability_status === 'out_of_stock';
                const isExpired = p.availability_status === 'expired';
                
                let statusBadge = '';
                let statusMessage = '';
                
                if (isNotAvailable) {
                    statusBadge = '<span class="badge bg-secondary mb-2">Not Available</span>';
                    statusMessage = '<p class="text-muted">This product has not been added to stock yet</p>';
                } else if (isExpired) {
                    statusBadge = '<span class="badge bg-danger mb-2">Expired</span>';
                    statusMessage = '<p class="text-danger">This product has expired</p>';
                } else if (isOutOfStock) {
                    statusBadge = '<span class="badge bg-warning mb-2">Out of Stock</span>';
                    statusMessage = '<p class="text-warning">Currently out of stock</p>';
                } else if (isExpiringSoon) {
                    statusBadge = '<span class="badge bg-warning mb-2">⚠️ Expiring Soon</span>';
                }
                
                return `
                    <div class="col-md-3 col-sm-6 mb-3">
                        <div class="card h-100 ${!isAvailable ? 'opacity-75' : ''}">
                            <div class="card-body text-center">
                                <h5 class="card-title fw-bold">${p.product_name}</h5>
                                ${p.mg ? `<p class="text-muted mb-2">${p.mg}</p>` : ''}
                                ${statusBadge}
                                ${isAvailable ? `
                                    <p class="mb-2"><strong>Price:</strong> <span class="text-primary fs-5">${formatCurrency(p.selling_price)}</span></p>
                                    ${p.scheme ? `<p class="text-success mb-2"><i class="fas fa-gift"></i> Buy ${p.scheme} Get 1 FREE!</p>` : ''}
                                    <p class="mb-3"><small>Stock: ${p.stock_quantity}</small></p>
                                    <button class="btn btn-primary w-100" onclick="addToCart(${p.id}, '${p.product_name}', ${p.selling_price}, ${p.stock_quantity})">
                                        <i class="fas fa-cart-plus"></i> Add to Cart
                                    </button>
                                ` : `
                                    ${statusMessage}
                                    <button class="btn btn-secondary w-100" disabled>
                                        <i class="fas fa-ban"></i> Not Available
                                    </button>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function searchProducts() {
            const searchTerm = document.getElementById('searchProducts').value.toLowerCase();
            
            if (searchTerm === '') {
                displayProducts(allProducts);
                return;
            }
            
            const filtered = allProducts.filter(p => 
                p.product_name.toLowerCase().includes(searchTerm) ||
                (p.mg && p.mg.toLowerCase().includes(searchTerm))
            );
            
            displayProducts(filtered);
        }
        
        function clearSearch() {
            document.getElementById('searchProducts').value = '';
            selectedSection = null;
            loadSections();
            loadProducts();
        }
        
        async function showCart() {
            try {
                const cart = getCart();
                
                const container = document.getElementById('cartItems');
                
                if (cart.length === 0) {
                    container.innerHTML = '<div class="alert alert-info">Your cart is empty. Start adding products!</div>';
                } else {
                    container.innerHTML = cart.map(item => `
                        <div class="cart-item">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h5>${item.productName}</h5>
                                    <p class="mb-0">${formatCurrency(item.price)} × ${item.quantity}</p>
                                </div>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="quantity-control">
                                        <button class="btn btn-sm btn-outline-primary" onclick="updateCartQuantity(${item.productId}, ${item.quantity - 1});">
                                            <i class="fas fa-minus"></i>
                                        </button>
                                        <input type="number" class="form-control" value="${item.quantity}" min="1" max="${item.maxStock}" 
                                            onchange="updateCartQuantity(${item.productId}, parseInt(this.value));">
                                        <button class="btn btn-sm btn-outline-primary" onclick="updateCartQuantity(${item.productId}, ${item.quantity + 1});">
                                            <i class="fas fa-plus"></i>
                                        </button>
                                    </div>
                                    <button class="btn btn-sm btn-danger" onclick="removeFromCartAndUpdate(${item.productId});">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="text-end mt-2">
                                <strong>Total: ${formatCurrency(item.price * item.quantity)}</strong>
                            </div>
                        </div>
                    `).join('');
                }
                
                if (cart.length > 0) {
                    const totals = await calculateCartTotals();
                    document.getElementById('cartSubtotal').textContent = formatCurrency(totals.subtotal);
                    document.getElementById('cartSgst').textContent = formatCurrency(totals.sgst);
                    document.getElementById('cartCgst').textContent = formatCurrency(totals.cgst);
                    document.getElementById('cartSgstPercent').textContent = totals.sgst_percentage;
                    document.getElementById('cartCgstPercent').textContent = totals.cgst_percentage;
                    document.getElementById('cartGrandTotal').textContent = formatCurrency(totals.grandTotal);
                } else {
                    document.getElementById('cartSubtotal').textContent = '₹0.00';
                    document.getElementById('cartSgst').textContent = '₹0.00';
                    document.getElementById('cartCgst').textContent = '₹0.00';
                    document.getElementById('cartSgstPercent').textContent = '0';
                    document.getElementById('cartCgstPercent').textContent = '0';
                    document.getElementById('cartGrandTotal').textContent = '₹0.00';
                }
                
                // Only show modal if it's not already shown
                const modalElement = document.getElementById('cartModal');
                const existingModal = bootstrap.Modal.getInstance(modalElement);
                if (!existingModal || !existingModal._isShown) {
                    new bootstrap.Modal(modalElement).show();
                }
            } catch (error) {
                console.error('Error showing cart:', error);
                showAlert('Error loading cart. Please try again.', 'danger');
            }
        }
        
        // Update cart quantity without reopening modal
        function updateCartQuantity(productId, quantity) {
            updateQuantity(productId, quantity);
            updateCartDisplay();
        }
        
        // Remove from cart without reopening modal
        function removeFromCartAndUpdate(productId) {
            removeFromCart(productId);
            updateCartDisplay();
        }
        
        // Update cart display without reopening modal
        async function updateCartDisplay() {
            try {
                const cart = getCart();
                const container = document.getElementById('cartItems');
                
                if (cart.length === 0) {
                    container.innerHTML = '<div class="alert alert-info">Your cart is empty. Start adding products!</div>';
                    document.getElementById('cartSubtotal').textContent = '₹0.00';
                    document.getElementById('cartSgst').textContent = '₹0.00';
                    document.getElementById('cartCgst').textContent = '₹0.00';
                    document.getElementById('cartSgstPercent').textContent = '0';
                    document.getElementById('cartCgstPercent').textContent = '0';
                    document.getElementById('cartGrandTotal').textContent = '₹0.00';
                } else {
                    container.innerHTML = cart.map(item => `
                        <div class="cart-item">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h5>${item.productName}</h5>
                                    <p class="mb-0">${formatCurrency(item.price)} × ${item.quantity}</p>
                                </div>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="quantity-control">
                                        <button class="btn btn-sm btn-outline-primary" onclick="updateCartQuantity(${item.productId}, ${item.quantity - 1});">
                                            <i class="fas fa-minus"></i>
                                        </button>
                                        <input type="number" class="form-control" value="${item.quantity}" min="1" max="${item.maxStock}" 
                                            onchange="updateCartQuantity(${item.productId}, parseInt(this.value));">
                                        <button class="btn btn-sm btn-outline-primary" onclick="updateCartQuantity(${item.productId}, ${item.quantity + 1});">
                                            <i class="fas fa-plus"></i>
                                        </button>
                                    </div>
                                    <button class="btn btn-sm btn-danger" onclick="removeFromCartAndUpdate(${item.productId});">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="text-end mt-2">
                                <strong>Total: ${formatCurrency(item.price * item.quantity)}</strong>
                            </div>
                        </div>
                    `).join('');
                    
                    const totals = await calculateCartTotals();
                    document.getElementById('cartSubtotal').textContent = formatCurrency(totals.subtotal);
                    document.getElementById('cartSgst').textContent = formatCurrency(totals.sgst);
                    document.getElementById('cartCgst').textContent = formatCurrency(totals.cgst);
                    document.getElementById('cartSgstPercent').textContent = totals.sgst_percentage;
                    document.getElementById('cartCgstPercent').textContent = totals.cgst_percentage;
                    document.getElementById('cartGrandTotal').textContent = formatCurrency(totals.grandTotal);
                }
            } catch (error) {
                console.error('Error updating cart:', error);
            }
        }
        
        async function placeOrder() {
            if (!selectedStore) {
                showAlert('Please select a medical store first', 'warning');
                return;
            }
            
            const cart = getCart();
            if (cart.length === 0) {
                showAlert('Your cart is empty', 'warning');
                return;
            }
            
            const items = cart.map(item => ({
                product_id: item.productId,
                quantity: item.quantity
            }));
            
            try {
                const response = await axios.post('/orders', {
                    items,
                    user_id: selectedStore.id
                });
                
                showAlert('Order placed successfully!', 'success');
                clearCart();
                bootstrap.Modal.getInstance(document.getElementById('cartModal')).hide();
                
                setTimeout(() => {
                    window.location.href = `../invoice.html?order_id=${response.data.order_id}`;
                }, 1500);
            } catch (error) {
                showAlert(error.response?.data?.message || 'Error placing order', 'danger');
            }
        }
        
        updateCartCount();
    </script>
</body>
</html>
